name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Update versions in all source files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # manifest.json (intégration HA)
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" \
            custom_components/mediatheque_veauche/manifest.json
          # __init__.py CARD_VERSION (cache-bust de la ressource Lovelace)
          sed -i "s/^CARD_VERSION = \".*\"$/CARD_VERSION = \"${VERSION}\"/" \
            custom_components/mediatheque_veauche/__init__.py
          # frontend/src/version.ts (banner console + constante exportée)
          sed -i "s/export const MEDIATHEQUE_CARD_VERSION = '.*';/export const MEDIATHEQUE_CARD_VERSION = '${VERSION}';/" \
            frontend/src/version.ts
          # frontend/package.json + package-lock.json
          (cd frontend && npm version --no-git-tag-version --allow-same-version "${VERSION}")

      - name: Rebuild frontend bundle with new version
        working-directory: frontend
        run: |
          npm run typecheck
          npm run build

      - name: Commit version bump and rebuilt bundle
        run: |
          git config user.name "Eric-D"
          git config user.email "Eric-D@users.noreply.github.com"
          git add \
            custom_components/mediatheque_veauche/manifest.json \
            custom_components/mediatheque_veauche/__init__.py \
            custom_components/mediatheque_veauche/www/mediatheque-card.js \
            frontend/src/version.ts \
            frontend/package.json \
            frontend/package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
            git push origin master
            # Move tag to include version bump commit
            git tag -f "$GITHUB_REF_NAME"
            git push origin "$GITHUB_REF_NAME" --force
          fi

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          {
            echo "## Changements"
            echo ""
            echo "$CHANGELOG"
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
