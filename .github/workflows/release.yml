name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json and card version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" \
            custom_components/mediatheque_veauche/manifest.json
          sed -i "s/const MEDIATHEQUE_CARD_VERSION = '.*'/const MEDIATHEQUE_CARD_VERSION = '${VERSION}'/" \
            custom_components/mediatheque_veauche/www/mediatheque-card.js \
            www/mediatheque-card.js

      - name: Commit version bump
        run: |
          git config user.name "Eric-D"
          git config user.email "Eric-D@users.noreply.github.com"
          git add custom_components/mediatheque_veauche/manifest.json \
            custom_components/mediatheque_veauche/www/mediatheque-card.js \
            www/mediatheque-card.js
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
            git push origin master
            # Move tag to include version bump commit
            git tag -f "$GITHUB_REF_NAME"
            git push origin "$GITHUB_REF_NAME" --force
          fi

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          {
            echo "## Changements"
            echo ""
            echo "$CHANGELOG"
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
